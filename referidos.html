<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anato SMG - Panel V5</title>
    <style>
        :root { --verde: #ADFF2F; --fondo: #121212; --gris: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fondo); color: white; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: var(--gris); padding: 25px; border-radius: 15px; border: 2px solid var(--verde); box-shadow: 0 0 20px rgba(173,255,47,0.3); }
        h1 { color: var(--verde); text-align: center; font-size: 1.2rem; text-transform: uppercase; margin-bottom: 20px; text-shadow: 0 0 5px var(--verde); }
        label { display: block; margin: 15px 0 5px; font-size: 0.8rem; color: var(--verde); font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: var(--verde); font-size: 1rem; box-sizing: border-box; }
        .preview-box { background: #000; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px dashed var(--verde); }
        .bar-container { background: #333; height: 30px; border-radius: 15px; overflow: hidden; border: 1px solid #555; }
        .bar-fill { height: 100%; width: 10%; background: var(--verde); transition: width 0.5s; display: flex; align-items: center; justify-content: center; font-weight: bold; color: black; font-size: 0.9rem; box-shadow: 0 0 10px var(--verde); }
        .btn { display: block; width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-whatsapp { background-color: #25d366; color: white; }
        .btn-group { background-color: var(--verde); color: black; }
        .msg-selector { border: 2px solid var(--verde); background: #2a2a2a; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>MULTISERVICIO ANATO SMG<br>SISTEMA DE REFERIDOS</h1>
    
    <label>NOMBRE DEL CLIENTE (SR./SRA.):</label>
    <input type="text" id="nombreRefiere" placeholder="Ej: Sr. Géminis" oninput="updatePreview()">

    <label>TELÉFONO DEL CLIENTE:</label>
    <input type="text" id="telRefiere" placeholder="04XX-XXXXXXX">

    <label>NOMBRE DEL REFERIDO (NUEVO):</label>
    <input type="text" id="nombreNuevo" placeholder="Nombre del referido">

    <label>PORCENTAJE ACTUAL:</label>
    <select id="porcentaje" onchange="updatePreview()">
        <option value="10">10%</option><option value="20">20%</option><option value="30">30%</option>
        <option value="40">40%</option><option value="50">50%</option><option value="60">60%</option>
        <option value="70">70%</option><option value="80">80%</option><option value="90">90%</option>
        <option value="100">100%</option>
    </select>

    <div class="preview-box">
        <div class="bar-container"><div id="visualBar" class="bar-fill">10%</div></div>
    </div>

    <button class="btn btn-whatsapp" onclick="enviarReferido()">📲 INVITAR NUEVO REFERIDO</button>

    <hr style="border: 0.5px solid #444; margin: 25px 0;">
    
    <label>TIPO DE MENSAJE PARA EL GRUPO:</label>
    <select id="tipoMensaje" class="msg-selector">
        <option value="espera">⏳ Cliente en Espera (Contactado)</option>
        <option value="listo">✅ Servicio Concretado (Ganó %)</option>
        <option value="meta">🚀 Estatus de Meta (Motivación)</option>
    </select>

    <button class="btn btn-group" onclick="enviarGrupo()">🔥 PUBLICAR EN GRUPO</button>
</div>

<script>
    function updatePreview() {
        const pct = document.getElementById('porcentaje').value;
        const bar = document.getElementById('visualBar');
        bar.style.width = pct + '%';
        bar.innerText = pct + '%';
    }

    function enviarReferido() {
        const nuevo = document.getElementById('nombreNuevo').value || "Cliente";
        const refiere = document.getElementById('nombreRefiere').value || "un amigo";
        const tel = document.getElementById('telRefiere').value || "";
        const msg = "¡Hola " + nuevo + "! ❄️ Tu amigo " + refiere + " (Tel: " + tel + ") confía en *Multiservicio Anato SMG* y te ha referido. ¡Al aceptar tu servicio, él gana un *10% de descuento* y tú también entras al sistema para ganar mantenimientos *GRATIS*! ¿Te gustaría agendar una revisión?";
        window.open("https://wa.me/?text=" + encodeURIComponent(msg));
    }

    function enviarGrupo() {
        const refiere = document.getElementById('nombreRefiere').value || "Cliente";
        const pct = document.getElementById('porcentaje').value;
        const tipo = document.getElementById('tipoMensaje').value;
        let barVisual = "█".repeat(pct/10) + "░".repeat(10-(pct/10));
        let cuerpo = "";

        if(tipo === "espera") cuerpo = "⏳ Su referido ya fue contactado. Estamos en espera de concretar el servicio para activar su *" + pct + "%* de descuento.";
        else if(tipo === "listo") cuerpo = "✅ ¡Buenas noticias! Su amigo ya concretó el servicio. ¡Ya tiene su *" + pct + "%* de descuento ASEGURADO! ❄️";
        else cuerpo = "🚀 ¡Atención! Ya lleva un *" + pct + "%* acumulado. Está muy cerca de la meta del mantenimiento GRATIS. ¡Siga así! 🏆";

        const msg = "🚀 *SISTEMA DE REFERIDOS ANATO SMG* 🛠️\\n\\n👤 *CLIENTE:* " + refiere + "\\n📊 *PROGRESO:* [" + barVisual + "] " + pct + "%\\n\\n💬 " + cuerpo;
        window.open("https://wa.me/?text=" + encodeURIComponent(msg));
    }
</script>
</body>
</html>
