<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anato SMG - Panel Full Equipo</title>
    <style>
        :root { --verde: #ADFF2F; --fondo: #121212; --gris: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fondo); color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .form-container { width: 100%; max-width: 480px; background: var(--gris); padding: 15px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; box-sizing: border-box; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; margin: 8px 0 3px; color: var(--verde); font-weight: bold; font-size: 0.8rem; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: var(--verde); font-size: 0.9rem; box-sizing: border-box; }
        
        .card {
            width: 100%; max-width: 400px; background: linear-gradient(145deg, #1a1a1a, #000);
            border: 3px solid var(--verde); border-radius: 20px; padding: 20px; text-align: center;
            box-shadow: 0 0 25px rgba(173, 255, 47, 0.2); box-sizing: border-box;
        }
        .info-row { text-align: left; margin: 8px 0; border-bottom: 1px solid #333; padding-bottom: 3px; }
        .info-label { color: var(--verde); font-size: 0.65rem; text-transform: uppercase; }
        .info-value { font-size: 1rem; color: #fff; display: block; font-weight: bold; }
        
        .price-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .price-box { background: #222; padding: 10px; border-radius: 10px; border: 1px solid var(--verde); }
        .service-box { background: var(--verde); color: black; padding: 10px; border-radius: 10px; margin-top: 15px; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        .btn { width: 100%; max-width: 480px; padding: 15px; background: var(--verde); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 style="color:var(--verde); text-align:center; margin:0 0 10px; font-size:1.1rem;">DATOS DEL SERVICIO</h2>
    
    <div class="grid-inputs">
        <div><label>NOMBRE:</label><input type="text" id="inNombre" oninput="generar()"></div>
        <div><label>APELLIDO:</label><input type="text" id="inApellido" oninput="generar()"></div>
    </div>

    <div class="grid-inputs">
        <div><label>TELÉFONO:</label><input type="text" id="inTel" placeholder="04XX..." oninput="generar()"></div>
        <div><label>FECHA:</label><input type="date" id="inFecha" oninput="generar()"></div>
    </div>

    <label>LUGAR / DIRECCIÓN:</label>
    <input type="text" id="inLugar" placeholder="Ej: Los Guayos" oninput="generar()">

    <label>SERVICIO:</label>
    <select id="inServicio" onchange="generar()">
        <option value="REVISIÓN Y CHEQUEO">REVISIÓN Y CHEQUEO</option>
        <option value="MANTENIMIENTO PREVENTIVO">MANTENIMIENTO PREVENTIVO</option>
        <option value="REPARACIÓN TÉCNICA">REPARACIÓN TÉCNICA</option>
        <option value="INSTALACIÓN DE EQUIPO">INSTALACIÓN DE EQUIPO</option>
        <option value="CARGA DE GAS">CARGA DE GAS</option>
    </select>

    <div class="grid-inputs" style="margin-top:10px; background:#222; padding:10px; border-radius:10px;">
        <div><label>TASA BCV (Bs):</label><input type="number" id="inTasa" value="36.50" step="0.01" oninput="generar()"></div>
        <div><label>MONTO ($):</label><input type="number" id="inDolar" placeholder="0.00" oninput="generar()"></div>
    </div>
</div>

<div class="card" id="pase">
    <h2 style="color:var(--verde); font-size:1.1rem; margin:0 0 15px;">MULTISERVICIO ANATO SMG</h2>
    
    <div class="info-row">
        <span class="info-label">Cliente:</span>
        <span class="info-value" id="outNombre">---</span>
    </div>

    <div class="grid-inputs">
        <div class="info-row"><span class="info-label">Teléfono:</span><span id="outTel" class="info-value">---</span></div>
        <div class="info-row"><span class="info-label">Fecha:</span><span id="outFecha" class="info-value">--/--/--</span></div>
    </div>

    <div class="info-row"><span class="info-label">Lugar:</span><span id="outLugar" class="info-value">---</span></div>

    <div class="price-container">
        <div class="price-box"><span class="info-label">Total $:</span><span id="outDolar" class="info-value">0.00</span></div>
        <div class="price-box"><span class="info-label">Total Bs:</span><span id="outBs" class="info-value">0.00</span></div>
    </div>

    <div class="service-box" id="outServicio">REVISIÓN Y CHEQUEO</div>
</div>

<button class="btn" onclick="compartir()">📲 ENVIAR ORDEN COMPLETA</button>

<script>
    function generar() {
        const nom = document.getElementById('inNombre').value.toUpperCase();
        const ape = document.getElementById('inApellido').value.toUpperCase();
        const tel = document.getElementById('inTel').value;
        const lugar = document.getElementById('inLugar').value.toUpperCase();
        const fechaRaw = document.getElementById('inFecha').value;
        const servicio = document.getElementById('inServicio').value;
        const tasa = parseFloat(document.getElementById('inTasa').value) || 0;
        const montoDolar = parseFloat(document.getElementById('inDolar').value) || 0;

        let fFormated = "--/--/--";
        if(fechaRaw) { const d = fechaRaw.split("-"); fFormated = d[2]+"/"+d[1]+"/"+d[0]; }

        document.getElementById('outNombre').innerText = nom + " " + ape;
        document.getElementById('outTel').innerText = tel || "---";
        document.getElementById('outFecha').innerText = fFormated;
        document.getElementById('outLugar').innerText = lugar || "---";
        document.getElementById('outServicio').innerText = servicio;
        document.getElementById('outDolar').innerText = montoDolar.toFixed(2);
        document.getElementById('outBs').innerText = (montoDolar * tasa).toFixed(2);
    }

    function compartir() {
        const cliente = document.getElementById('outNombre').innerText;
        const tel = document.getElementById('outTel').innerText;
        const fecha = document.getElementById('outFecha').innerText;
        const lugar = document.getElementById('outLugar').innerText;
        const serv = document.getElementById('outServicio').innerText;
        const usd = document.getElementById('outDolar').innerText;
        const bs = document.getElementById('outBs').innerText;

        const msg = encodeURIComponent("❄️ *ANATO SMG - ORDEN TÉCNICA* 🛠️\\n\\n👤 *CLIENTE:* " + cliente + "\\n📞 *TEL:* " + tel + "\\n📍 *LUGAR:* " + lugar + "\\n📅 *FECHA:* " + fecha + "\\n🛠️ *SERVICIO:* " + serv + "\\n\\n💰 *PRESUPUESTO:*\\n💵 USD: $" + usd + "\\n💸 Bs: " + bs + "\\n\\n*¡Servicio profesional garantizado!*");
        window.open("https://wa.me/?text=" + msg);
    }
</script>
</body>
</html>
