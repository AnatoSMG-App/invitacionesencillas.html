<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anato SMG - Generador de Órdenes</title>
    <style>
        :root { --verde: #ADFF2F; --fondo: #121212; --gris: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fondo); color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .form-container { width: 100%; max-width: 450px; background: var(--gris); padding: 20px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; color: var(--verde); font-weight: bold; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: var(--verde); font-size: 1rem; box-sizing: border-box; }
        
        /* EL PASE FINAL */
        .card {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 3px solid var(--verde);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 25px rgba(173, 255, 47, 0.2);
            position: relative;
            overflow: hidden;
        }
        .card h2 { color: var(--verde); text-transform: uppercase; margin: 0 0 15px; font-size: 1.2rem; letter-spacing: 2px; }
        .info-row { text-align: left; margin: 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .info-label { color: var(--verde); font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .info-value { font-size: 1.1rem; color: #fff; display: block; }
        
        .service-box {
            background: var(--verde);
            color: black;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn { width: 100%; max-width: 450px; padding: 15px; background: var(--verde); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 style="color:var(--verde); text-align:center; margin:0 0 15px;">GENERADOR DE ORDEN</h2>
    
    <label>NOMBRE DEL CLIENTE:</label>
    <input type="text" id="inNombre" placeholder="Ej: Vexymar" oninput="generar()">

    <label>FECHA DE LA CITA:</label>
    <input type="date" id="inFecha" oninput="generar()">

    <label>SERVICIO A REALIZAR:</label>
    <select id="inServicio" onchange="generar()">
        <option value="REVISIÓN Y CHEQUEO">REVISIÓN Y CHEQUEO</option>
        <option value="MANTENIMIENTO PREVENTIVO">MANTENIMIENTO PREVENTIVO</option>
        <option value="REPARACIÓN TÉCNICA">REPARACIÓN TÉCNICA</option>
        <option value="INSTALACIÓN DE EQUIPO">INSTALACIÓN DE EQUIPO</option>
        <option value="CARGA DE GAS REFRIGERANTE">CARGA DE GAS REFRIGERANTE</option>
    </select>
</div>

<div class="card" id="pase">
    <h2>ORDEN DE SERVICIO<br>MULTISERVICIOS ANATO SMG</h2>
    
    <div class="info-row">
        <span class="info-label">Cliente:</span>
        <span class="info-value" id="outNombre">---</span>
    </div>

    <div class="info-row">
        <span class="info-label">Fecha Programada:</span>
        <span class="info-value" id="outFecha">-- / -- / ----</span>
    </div>

    <div class="info-label" style="margin-top:15px;">Servicio a Realizar:</div>
    <div class="service-box" id="outServicio">REVISIÓN Y CHEQUEO</div>
    
    <p style="font-size: 0.6rem; color: #777; margin-top: 15px;">Presente esta orden al momento de la visita técnica.</p>
</div>

<button class="btn" onclick="compartir()">📲 ENVIAR POR WHATSAPP</button>

<script>
    function generar() {
        // Capturar datos
        const nombre = document.getElementById('inNombre').value || "---";
        const fechaRaw = document.getElementById('inFecha').value;
        const servicio = document.getElementById('inServicio').value;

        // Formatear Fecha
        let fechaFormateada = "-- / -- / ----";
        if(fechaRaw) {
            const d = fechaRaw.split("-");
            fechaFormateada = d[2] + "/" + d[1] + "/" + d[0];
        }

        // Mostrar en el Pase
        document.getElementById('outNombre').innerText = nombre.toUpperCase();
        document.getElementById('outFecha').innerText = fechaFormateada;
        document.getElementById('outServicio').innerText = servicio;
    }

    function compartir() {
        const nombre = document.getElementById('outNombre').innerText;
        const fecha = document.getElementById('outFecha').innerText;
        const servicio = document.getElementById('outServicio').innerText;

        const msg = encodeURIComponent("❄️ *ORDEN DE SERVICIO - ANATO SMG* 🛠️\\n\\n👤 *CLIENTE:* " + nombre + "\\n📅 *CITA:* " + fecha + "\\n🛠️ *SERVICIO:* " + servicio + "\\n\\n¡Todo listo! Por favor, guarde esta orden para su visita técnica.");
        window.open("https://wa.me/?text=" + msg);
    }
</script>

</body>
</html>
